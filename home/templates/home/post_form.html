{% extends 'base.html' %}

{% block title %}{% if form.instance.pk %}ویرایش پست{% else %}نوشتن پست جدید{% endif %}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <h2>{% if form.instance.pk %}ویرایش پست{% else %}پست جدید{% endif %}</h2>
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-success">ذخیره</button>
            <a href="{% url 'home:home' %}" class="btn btn-secondary">انصراف</a>
        </form>
    </div>
</div>
{% endblock %}
