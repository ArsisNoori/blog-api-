{% extends 'base.html' %}

{% block title %}حذف پست{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-danger text-white">
                تأیید حذف
            </div>
            <div class="card-body">
                <p>آیا از حذف پست "{{ post.title }}" اطمینان دارید؟</p>
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">بله، حذف کن</button>
                    <a href="{% url 'home:home'%}" class="btn btn-secondary">انصراف</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
